      necessary: true
      reason: "Testa mcp/server.py (31% → 100%) — o gap principal da tarefa. Cobre _node_to_dict, create_server, 5 tools MCP e serve_mcp."
    - path: tests/test_coverage_gaps.py
      necessary: true
      reason: "Adiciona testes para early-returns defensivos dos parsers: RuntimeError em __init__ (mock de LANGUAGE=None), handlers sem name_node/module_node/func_node."
    - path: tests/test_queries_impact.py
      necessary: true
      reason: "Cobre linhas 85/100 de impact.py: dependents aninhados via inherits e calls com cadeia de depth >= 2."
  removed_imports_clean: true
  notes: |
    Todos os 3 arquivos rastreiam direto ao objetivo "aumentar cobertura".
    Zero mudança em código de produção — apenas testes.
    Import órfão Path removido de test_mcp_server.py (não usado após refatoração
    para usar fixture store em vez de tmp_path direto).
